name: Build

on:
  push:
    tags:
      - 'v[0-9]*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.1

    - name: Run tests
      run: zig build test --summary all

    - name: Build framework XLL
      run: zig build

    - name: Upload framework XLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: zigxll-framework
        path: zig-out/lib/output.xll
        if-no-files-found: error

    - name: Build example XLL
      working-directory: example
      run: zig build

    - name: Upload example XLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: zigxll-example
        path: example/zig-out/lib/my_excel_functions.xll
        if-no-files-found: error

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          zig-out/lib/output.xll
          example/zig-out/lib/my_excel_functions.xll
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
